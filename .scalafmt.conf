version = 3.10.7
maxColumn = 140
lineEndings = unix
align.preset = some

docstrings {
  style = SpaceAsterisk
  removeEmpty = true
  oneline = fold
}

rewrite {
  trailingCommas.style = keep
  rules = [RedundantParens, SortImports, SortModifiers]

  scala3.removeOptionalBraces = {enabled: false}
}

runner.dialect = scala3
